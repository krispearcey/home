<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kris Pearcey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Merriweather -->
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#243126;
--text:#f5f5f0;
--muted:rgba(245,245,240,0.9);
--soft:rgba(245,245,240,0.62);
--accent:#ff4d73;
--accent-hover:#ff6b8a;
--button-text:#ffffff;
--toggle-border:rgba(245,245,240,0.16);
}

body.light{
--bg:#ececec;
--text:#131313;
--muted:rgba(19,19,19,0.9);
--soft:rgba(19,19,19,0.48);
--accent:#ff4d73;
--accent-hover:#ff355f;
--button-text:#ffffff;
--toggle-border:rgba(19,19,19,0.14);
}

*{
box-sizing:border-box;
}

html,body{
margin:0;
min-height:100%;
}

body{
background:var(--bg);
color:var(--text);
font-family:Georgia,serif;
transition:background-color .22s ease,color .22s ease;
}

/* top icons */

.top-actions{
position:fixed;
top:22px;
right:22px;
display:flex;
align-items:center;
gap:10px;
z-index:10;
}

.icon-link,
.theme-toggle{
width:42px;
height:42px;
border:1px solid var(--toggle-border);
background:transparent;
color:var(--text);
border-radius:999px;
display:inline-flex;
align-items:center;
justify-content:center;
font-size:1rem;
text-decoration:none;
cursor:pointer;
transition:opacity .18s ease,border-color .18s ease,color .18s ease,transform .18s ease;
}

.icon-link:hover,
.theme-toggle:hover{
opacity:.9;
transform:translateY(-1px);
}

/* layout */

.page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:48px 24px;
}

.content{
width:min(100%,570px);
transform:translateY(-1.5vh);
}

/* hero */

h1{
margin:0 0 10px;
font-family:'Merriweather',serif;
font-size:clamp(2rem,2.6vw,2.6rem);
font-weight:500;
letter-spacing:-0.02em;
line-height:1.1;
}

/* intro text */

.intro,
.recent-label,
.build-line{
font-family:'Merriweather',serif;
font-size:clamp(.95rem,1vw,1rem);
line-height:1.45;
letter-spacing:.02em;
word-spacing:.04em;
}

.intro{
margin:0 0 6px;
color:var(--muted);
}

.recent-label{
margin:0 0 10px;
color:var(--text);
}

.build-line{
margin-top:18px;
color:var(--muted);
}

/* activity list */

.activity-list{
list-style:none;
padding:0;
margin:10px 0 0;
}

.activity-list li{
position:relative;
padding-left:22px;
margin:0 0 12px;
font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
font-size:clamp(.95rem,1vw,1rem);
line-height:1.45;
color:var(--text);
}

.activity-list li::before{
content:">";
position:absolute;
left:0;
top:0;
color:var(--soft);
}

/* links */

a{
color:var(--accent);
text-decoration:none;
}

a:hover{
color:var(--accent-hover);
}

/* buttons */

.buttons{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:26px;
}

.btn{
min-width:150px;
padding:13px 22px;
border:1px solid var(--accent);
display:inline-flex;
align-items:center;
justify-content:center;
font-size:.98rem;
line-height:1;
letter-spacing:.04em;
font-family:'Merriweather',serif;
transition:background-color .18s ease,color .18s ease,border-color .18s ease,transform .18s ease;
}

.btn:hover{
transform:translateY(-1px);
}

.btn.primary{
background:var(--accent);
color:var(--button-text);
}

.btn.primary:hover{
background:var(--accent-hover);
}

.btn.secondary{
background:transparent;
color:var(--accent);
}

.btn.secondary:hover{
background:rgba(255,77,115,.08);
}

/* mobile */

@media (max-width:640px){

.top-actions{
top:18px;
right:18px;
gap:8px;
}

.icon-link,
.theme-toggle{
width:40px;
height:40px;
}

.page{
align-items:flex-start;
padding-top:100px;
}

.content{
transform:none;
}

.buttons{
flex-direction:column;
}

.btn{
width:100%;
}

}

</style>
</head>
