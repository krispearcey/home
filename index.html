<style>
:root {
  --bg: #243126;
  --text: #f5f5f0;
  --muted: rgba(245, 245, 240, 0.9);
  --soft: rgba(245, 245, 240, 0.62);
  --accent: #ff4d73;
  --accent-hover: #ff6b8a;
  --button-text: #ffffff;
  --toggle-border: rgba(245, 245, 240, 0.16);
}

body.light {
  --bg: #ececec;
  --text: #131313;
  --muted: rgba(19, 19, 19, 0.9);
  --soft: rgba(19, 19, 19, 0.48);
  --accent: #ff4d73;
  --accent-hover: #ff355f;
  --button-text: #ffffff;
  --toggle-border: rgba(19, 19, 19, 0.14);
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, serif;
  transition: background-color 0.22s ease, color 0.22s ease;
}

.page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}

.content {
  width: min(100%, 570px);
  transform: translateY(-1.5vh);
}

/* HERO TITLE */

h1 {
  margin: 0 0 8px;
  font-family: Georgia, serif;
  font-size: clamp(2.4rem, 3vw, 3rem);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

/* INTRO TEXT */

.intro,
.recent-label,
.build-line,
.activity-list li {
  font-family: Georgia, serif;
  font-size: clamp(0.95rem, 1vw, 1rem);
  line-height: 1.45;
}

.intro,
.build-line {
  margin: 0;
  color: var(--muted);
}

.recent-label {
  margin: 0;
  color: var(--text);
}

.activity-list {
  list-style: none;
  padding: 0;
  margin: 8px 0 22px;
}

.activity-list li {
  position: relative;
  padding-left: 22px;
  margin: 0 0 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  color: var(--text);
}

.activity-list li::before {
  content: ">";
  position: absolute;
  left: 0;
  top: 0;
  color: var(--soft);
}
</style>
