<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kris Pearcey</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b110d;
  --text:#f5f5f0;
  --muted:rgba(245,245,240,0.9);
  --soft:rgba(245,245,240,0.62);
  --accent:#ff3f67;
  --accent-hover:#ff577b;
  --toggle-border:rgba(245,245,240,0.16);
}

body.light{
  --bg:#ececec;
  --text:#131313;
  --muted:rgba(19,19,19,0.9);
  --soft:rgba(19,19,19,0.48);
  --accent:#ff3f67;
  --accent-hover:#ff2f5c;
  --toggle-border:rgba(19,19,19,0.14);
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  min-height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,serif;
  transition:background-color .22s ease,color .22s ease;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* top icons */

.top-actions{
  position:fixed;
  top:22px;
  right:22px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:10;
}

.icon-link,
.theme-toggle{
  width:42px;
  height:42px;
  border:1px solid var(--toggle-border);
  background:transparent;
  color:var(--text);
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:.98rem;
  text-decoration:none;
  cursor:pointer;
  transition:
    background-color .18s ease,
    color .18s ease,
    border-color .18s ease,
    transform .18s ease;
}

/* NEW HOVER STYLE */

.icon-link:hover,
.theme-toggle:hover{
  background:var(--accent);
  border-color:var(--accent);
  color:#ffffff;
  transform:translateY(-1px);
}

/* layout */

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 24px;
}

.content{
  width:min(100%,560px);
  transform:translateY(-1.6vh);
}

/* hero */

h1{
  margin:0 0 14px;
  font-family:"Merriweather",serif;
  font-size:clamp(1.9rem,2.2vw,2.28rem);
  font-weight:500;
  letter-spacing:-0.018em;
  line-height:1.1;
}

/* intro text */

.intro,
.recent-label,
.build-line{
  font-family:"Merriweather",serif;
  font-size:clamp(.95rem,.98vw,1rem);
  font-weight:400;
  line-height:1.5;
}

.intro{
  margin:0 0 4px;
  color:var(--muted);
}

.recent-label{
  margin:0 0 14px;
  color:var(--text);
}

.build-line{
  margin-top:16px;
  color:var(--muted);
}

/* activity list */

.activity-list{
  list-style:none;
  padding:0;
  margin:0;
}

.activity-list li{
  position:relative;
  padding-left:18px;
  margin:0 0 9px;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Courier New",monospace;
  font-size:clamp(.93rem,.97vw,.98rem);
  line-height:1.48;
}

.activity-list li::before{
  content:">";
  position:absolute;
  left:0;
  top:0;
  color:var(--soft);
}

/* links */

a{
  color:var(--accent);
  text-decoration:none;
}

a:hover{
  color:var(--accent-hover);
}

/* buttons */

.buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:22px;
}

.btn{
  min-width:128px;
  padding:12px 24px;
  border:1px solid var(--accent);
  border-radius:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-family:"Merriweather",serif;
  font-size:.92rem;
  transition:background-color .18s ease,color .18s ease,border-color .18s ease,transform .18s ease;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn.primary{
  background:var(--accent);
  color:#ffffff;
}

.btn.primary:hover{
  background:var(--accent-hover);
  border-color:var(--accent-hover);
}

.btn.secondary{
  background:transparent;
  color:var(--accent);
}

.btn.secondary:hover{
  background:rgba(255,63,103,.06);
  border-color:var(--accent-hover);
  color:var(--accent-hover);
}

/* mobile */

@media (max-width:640px){

  .top-actions{
    top:18px;
    right:18px;
  }

  .icon-link,
  .theme-toggle{
    width:40px;
    height:40px;
  }

  .page{
    align-items:flex-start;
    padding:100px 22px 40px;
  }

  .content{
    width:100%;
    transform:none;
  }

  .buttons{
    flex-direction:column;
  }

  .btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="top-actions">

<a class="icon-link" href="https://www.goodreads.com/user/show/134250743" target="_blank">
<i class="fa-brands fa-goodreads-g"></i>
</a>

<a class="icon-link" href="mailto:me@krispearcey.com">
<i class="fa-regular fa-envelope"></i>
</a>

<a class="icon-link" href="https://github.com/krispearcey" target="_blank">
<i class="fa-brands fa-github"></i>
</a>

<a class="icon-link" href="https://www.chess.com/member/krisper" target="_blank">
<i class="fa-solid fa-chess-rook"></i>
</a>

<button class="theme-toggle" id="themeToggle">
<i id="themeIcon" class="fa-regular fa-moon"></i>
</button>

</div>

<main class="page">
<section class="content">

<h1>Hi, I'm Kris.</h1>

<p class="intro">This is a collection of lines I’ve cast, written, or coded.</p>

<p class="recent-label">Recently, I’ve -</p>

<ul class="activity-list">

<li>Created <a href="https://krispearcey.github.io/chess/" target="_blank">“my own personal chess bot”</a></li>

<li>Written <a href="https://krispearcey.com" target="_blank">“The Hag”</a></li>

<li>Blogged <a href="https://krispearcey.com" target="_blank">“Woolly Buggers”</a></li>

<li id="goodreadsLine">
<span id="goodreadsLabel">been reading</span>
<a id="goodreadsBookLink" href="https://www.goodreads.com/user/show/134250743" target="_blank">
<span id="goodreadsBookText">loading…</span>
</a>
</li>

<li id="chessGameLine">
<span id="chessResultLabel">Played against</span>
<a id="chessOpponentLink" href="https://www.chess.com/member/krisper" target="_blank">
<span id="chessOpponent">loading…</span>
</a>
</li>

</ul>

<p class="build-line">I’m currently building at <a href="#">this</a>.</p>

<div class="buttons">

<a class="btn primary" href="https://github.com/krispearcey" target="_blank">
My Github
</a>

<a class="btn secondary" href="mailto:me@krispearcey.com">
Contact Me
</a>

</div>

</section>
</main>

<script>

const body=document.body;
const themeToggle=document.getElementById("themeToggle");
const themeIcon=document.getElementById("themeIcon");

const savedTheme=localStorage.getItem("kris-theme");

if(savedTheme==="light"){body.classList.add("light")}

syncThemeButton();

themeToggle.addEventListener("click",()=>{
body.classList.toggle("light");

localStorage.setItem(
"kris-theme",
body.classList.contains("light")?"light":"dark"
);

syncThemeButton();
});

function syncThemeButton(){
const isLight=body.classList.contains("light");
themeIcon.className=isLight?"fa-regular fa-sun":"fa-regular fa-moon";
}

</script>

</body>
</html>
